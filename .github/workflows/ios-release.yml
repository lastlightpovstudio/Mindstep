name: iOS Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build p12 and import certificate
        run: |
          echo "${{ secrets.APPLE_DIST_KEY }}" | base64 --decode > dist.key
          echo "${{ secrets.APPLE_DIST_PEM }}" | base64 --decode > dist.pem
          openssl pkcs12 -export -out distribution.p12 -inkey dist.key -in dist.pem -passout pass:ci_build
          security create-keychain -p "temp_keychain_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_keychain_password" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import distribution.p12 -k build.keychain -P "ci_build" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_keychain_password" build.keychain

      - name: Install provisioning profile
        run: |
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 --decode > distribution.mobileprovision
          UUID=$(security cms -D -i distribution.mobileprovision | grep -A1 '<key>UUID</key>' | tail -1 | sed 's/.*<string>\(.*\)<\/string>/\1/' | tr -d '[:space:]')
          NAME=$(security cms -D -i distribution.mobileprovision | grep -A1 '<key>Name</key>' | tail -1 | sed 's/.*<string>\(.*\)<\/string>/\1/')
          echo "Profile UUID: $UUID"
          echo "Profile Name: $NAME"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp distribution.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Installed profiles:"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Run Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: fastlane ios release
